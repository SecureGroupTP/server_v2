worker_processes auto;

events {
  worker_connections 1024;
}

stream {
  resolver 127.0.0.11 valid=30s ipv6=off;

  server {
    listen 9000;
    set $server_v2_tcp app:9000;
    proxy_pass $server_v2_tcp;
  }

  server {
    listen 9443 ssl;
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    set $server_v2_tcp app:9000;
    proxy_pass $server_v2_tcp;
  }
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format compact escape=json
    '{"@t":"$time_iso8601","@m":"nginx request completed","@i":"nginx_access","SourceContext":"nginx","method":"$request_method","path":"$uri","status_code":$status,"response_bytes":$body_bytes_sent,"request_time":$request_time,"remote_addr":"$remote_addr","user_agent":"$http_user_agent"}';

  access_log /dev/stdout compact;
  error_log /dev/stderr warn;

  resolver 127.0.0.11 valid=30s ipv6=off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 8080;

    location / {
      set $server_v2_http app:8080;
      proxy_pass http://$server_v2_http;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto http;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
    }
  }

  server {
    listen 8443 ssl;
    http2 on;
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
      set $server_v2_http app:8080;
      proxy_pass http://$server_v2_http;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
    }
  }
}
