app:
  name: server-v2
  host: 0.0.0.0
  ports:
    tcp_port: 9000
    http_port: 8080
    ws_port: 8080
  output_ports:
    tcp_port: 834
    tcp_tls_port: 9443
    http_port: 80
    https_port: 443
    ws_port: 80
    wss_port: 443
  session_challenge_ttl: 5m
  event_retention: 24h
  event_batch_size: 100
  event_redelivery_cooldown: 5s

push:
  fcm:
    enabled: false
    credentials_file: ""
    project_id: ""
    endpoint: "https://fcm.googleapis.com"
    timeout: 10s

logger:
  level: info
  human_readable: false

postgres:
  host: postgres
  port: 5432
  database: app
  username: postgres
  password: postgres
  ssl_mode: disable
  connect_timeout_seconds: 5

redis:
  host: redis
  port: 6379
  database: 0
  password: ""
