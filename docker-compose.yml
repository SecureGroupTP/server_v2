services:
  flyway:
    container_name: server-v2-flyway
    image: flyway/flyway:11-alpine
    command:
      - -configFiles=/flyway/conf/flyway.conf
      - migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/migrations:/flyway/sql:ro
      - ./db/flyway.conf:/flyway/conf/flyway.conf:ro
    networks:
      - backend
    restart: "no"

  app:
    container_name: server-v2-app
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      APP_CONFIG_PATH: /app/config/config.yaml
    volumes:
      - ./config/config.yaml:/app/config/config.yaml:ro
    depends_on:
      flyway:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    expose:
      - "8080"
      - "9000"
    restart: unless-stopped

  nginx:
    container_name: server-v2-nginx
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_started
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/certs:/etc/nginx/certs:ro
    networks:
      - backend
    ports:
      - "${NGINX_HTTP_PORT:-80}:8080"
      - "${NGINX_HTTPS_PORT:-443}:8443"
      - "${NGINX_TCP_PORT:-834}:9000"
      - "${NGINX_TCP_TLS_PORT:-9443}:9443"
    restart: unless-stopped

  postgres:
    container_name: server-v2-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    networks:
      - backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  redis:
    container_name: server-v2-redis
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    networks:
      - backend
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

networks:
  backend:
    name: server-v2-backend
    driver: bridge

volumes:
  postgres_data:
  redis_data:
